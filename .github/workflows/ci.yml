# Example GitHub Actions CI Workflow for Beacon App

name: CI

on:
  push:
    branches: [main, phase-1]
  pull_request:
    branches: [main, phase-1]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Run E2E tests
        run: npm run test:e2e
